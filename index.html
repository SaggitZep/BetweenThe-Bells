<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>בין הצלצולים</title>
    <style>
        :root {
            --bg-color: #fcfbfa;
            --sand-color: #f4f0e6;
            --primary-color: #4a5d2f;
            --accent-color: #a3b899;
            --text-color: #3a3a3a;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100dvh; /* שינוי קריטי למובייל */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        .phone-container {
            width: 100%;
            max-width: 410px;
            height: 100%; /* במקום 740px */
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* שאר העיצוב נשאר זהה, רק לוודא שה-screen תופס את המקום */
        .screens-wrapper { flex-grow: 1; position: relative; overflow: hidden; }
        .screen {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: space-between;
            padding: 40px 30px; opacity: 0; transition: opacity 0.3s ease;
        }
        .screen.active { display: flex; opacity: 1; }
        
        .btn-container { width: 100%; margin-top: 20px; }
        /* שאר ה-CSS שכתבת מצוין */
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="progress-bar-container" id="progressBarContainer"><div class="progress-bar" id="progressBar"></div></div>

        <div class="screens-wrapper">
            </div>
    </div>
    
    <script>
        // ... (הלוגיקה נשארת זהה)
    </script>
</body>
</html>
