<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>בין הצלצולים</title>
    <style>
        :root { --bg-color: #fcfbfa; --sand-color: #f4f0e6; --primary-color: #4a5d2f; --accent-color: #a3b899; --text-color: #3a3a3a; --card-bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-color); height: 100dvh; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; }
        .phone-container { width: 100%; max-width: 410px; height: 100%; background-color: var(--bg-color); position: relative; display: flex; flex-direction: column; }
        .progress-bar-container { width: 100%; height: 4px; background-color: var(--sand-color); display: none; }
        .progress-bar { height: 100%; width: 0%; background-color: var(--primary-color); transition: width 0.4s ease; }
        .screens-wrapper { flex-grow: 1; position: relative; overflow: hidden; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: space-between; padding: 40px 30px; opacity: 0; transition: opacity 0.3s ease; }
        .screen.active { display: flex; opacity: 1; }
        h1 { color: var(--primary-color); font-size: 1.8rem; margin-bottom: 15px; }
        p { font-size: 1rem; line-height: 1.5; color: #4a4a4a; margin-bottom: 15px; }
        button { width: 100%; background-color: var(--primary-color); color: white; border: none; padding: 16px; border-radius: 50px; font-size: 1rem; cursor: pointer; }
        textarea { width: 100%; height: 100px; padding: 10px; border-radius: 10px; border: 1px solid #ccc; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="progress-bar-container" id="progressBarContainer"><div class="progress-bar" id="progressBar"></div></div>
        <div class="screens-wrapper">
            <div class="screen active" id="screen1">
                <h1>בין הצלצולים</h1>
                <p>בואו ניקח שתי דקות לשים לב לרגע טוב שקרה היום.</p>
                <button onclick="nextScreen(2)">כניסה</button>
            </div>
            <div class="screen" id="screen2">
                <h1>לתפוס רגע טוב</h1>
                <p>מה קרה היום בבית הספר שעשה לך טוב?</p>
                <textarea id="input-event"></textarea>
                <button onclick="nextScreen(3)">המשך</button>
            </div>
            <div class="screen" id="screen3">
                <h1>להרחיב את הטוב</h1>
                <p>איזו תחושה עלתה בך ברגע הזה?</p>
                <button onclick="nextScreen(4)">המשך</button>
            </div>
            <div class="screen" id="screen4">
                <h1>החלק שלך</h1>
                <p>מה בך אפשר לרגע הזה לקרות?</p>
                <textarea id="input-resource"></textarea>
                <button onclick="nextScreen(5)">המשך</button>
            </div>
            <div class="screen" id="screen5">
                <h1>לקחת הלאה</h1>
                <p>מה תרצה/י לעשות שוב השבוע?</p>
                <textarea id="input-future"></textarea>
                <button onclick="nextScreen(6)">סיום</button>
            </div>
            <div class="screen" id="screen6">
                <h1>תודה שהקדשת רגע</h1>
                <p>עצירה קטנה על מה שעבד משנה את כל היום.</p>
                <button onclick="location.reload()">חזרה להתחלה</button>
            </div>
        </div>
    </div>
    <script>
        function nextScreen(n) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen' + n).classList.add('active');
            const pb = document.getElementById('progressBarContainer');
            pb.style.display = (n === 1) ? 'none' : 'block';
            document.getElementById('progressBar').style.width = ((n-1) * 20) + '%';
        }
    </script>
</body>
</html>
